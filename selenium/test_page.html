<!doctype html>
<html>
  <head>
    <title>Mi primera prueba Selenium</title>
  </head>
  <body>
    <h1>Hola Selenium</h1>

    <input id="nombre" type="text" />

    <button id="btnSaludar" onclick="saludar()">Saludar</button>

    <p id="resultado"></p>

    <script>
      function saludar() {
        let nombre = document.getElementById("nombre").value;
        document.getElementById("resultado").innerText = "Hola " + nombre;
      }
    </script>
  </body>
</html>
